<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>금융 상품</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/common.css"> <!-- 공통 스타일 -->
  <style>
    /* 전체 페이지 배경을 흰색으로 설정 */
    body {
      background-color: rgb(255, 255, 255);
    }

    .container {
      margin-top: 80px;
      padding: 20px;
      background-color: rgb(255, 255, 255); /* 컨테이너 배경을 흰색으로 설정 */
      border-radius: 10px;
      width: 1000px;
      margin-left: 330px;
    }

    h1 {
      text-align: center;
      color: #050000;
      margin-bottom: 20px;
    }

    .list-group-item {
      background-color: rgb(255, 255, 255); /* 리스트 항목 배경을 흰색으로 설정 */
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }

    .list-group-item:hover {
      background-color: #f1f9ff;
      box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2);
    }

    .list-group-item h4 {
      color: #007bff;
      margin-top: 5px;
      margin-bottom: 10px;
    }

    .list-group-item p {
      margin: 5px 0;
      color: #333;
    }
  </style>
</head>
<body>
<div th:replace="~{partials/navbar :: navbar}"></div>
<div class="container">
  <h1>금융 상품 소개</h1>
  <p>우리은행의 다양한 예·적금 상품과 그에 대한 정보를 확인할 수 있습니다.</p>
  <div class="list-group">
    <div th:each="product : ${products}" class="list-group-item">
      <h4 th:text="${product.title}"></h4>
      <p><strong>은행:</strong> <span th:text="${product.bank}"></span></p>
      <p><strong>최고 금리:</strong> <span th:text="${product.maxRate}"></span></p>
      <p><strong>기본 금리:</strong> <span th:text="${product.baseRate}"></span></p>
      <p><strong>상세 설명:</strong> <span th:text="${product.details}"></span></p>
    </div>
  </div>
</div>
</body>
</html>
